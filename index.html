<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airborne Miss WV 2026 • Hours Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50">
  <div class="max-w-4xl mx-auto p-6">
    <h1 class="text-3xl font-bold text-blue-700 mb-2">Airborne Production</h1>
    <h2 class="text-xl text-gray-600 mb-8">Miss West Virginia 2026 Hours Tracker</h2>

    <!-- Log Hours Form -->
    <div class="bg-white rounded-xl shadow p-6 mb-8">
      <h3 class="text-lg font-semibold mb-4">Log Your Hours</h3>
      <form id="hoursForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium mb-1">Your Name</label>
          <input type="text" id="name" required class="w-full border rounded-lg p-3">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Date</label>
          <input type="date" id="date" required class="w-full border rounded-lg p-3">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Start Time</label>
          <input type="time" id="start" required class="w-full border rounded-lg p-3">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">End Time</label>
          <input type="time" id="end" required class="w-full border rounded-lg p-3">
        </div>
        <div class="md:col-span-2">
          <label class="block text-sm font-medium mb-1">Role / Notes (e.g. Camera Op - Tuesday Blocking)</label>
          <input type="text" id="notes" class="w-full border rounded-lg p-3">
        </div>
        <button type="submit" class="md:col-span-2 bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700">
          Submit Hours
        </button>
      </form>
    </div>

    <!-- Personal Totals -->
    <div class="bg-white rounded-xl shadow p-6">
      <h3 class="text-lg font-semibold mb-4">Your Running Total</h3>
      <p class="text-sm text-gray-500 mb-4">Enter your name above and check back after submissions (or refresh).</p>
      <div id="personalTotal" class="text-4xl font-bold text-green-600">0.0</div>
      <p class="text-sm text-gray-500">hours this event</p>
    </div>

    <div class="mt-8 text-center text-sm text-gray-500">
      <p>Admin: <a href="https://docs.google.com/spreadsheets/..." target="_blank" class="text-blue-600">Full Team Dashboard</a></p>
      <p class="mt-1">Data saved to Google Sheets • Updates in real-time</p>
    </div>
  </div>

  <script>
    // TODO: Replace with your Google Form or Apps Script webhook URL
    const FORM_URL = "https://docs.google.com/forms/d/e/YOUR_FORM_ID/formResponse"; 

    document.getElementById('hoursForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const date = document.getElementById('date').value;
      const start = document.getElementById('start').value;
      const end = document.getElementById('end').value;
      const notes = document.getElementById('notes').value;

      const startTime = new Date(`${date} ${start}`);
      const endTime = new Date(`${date} ${end}`);
      const hours = ((endTime - startTime) / (1000 * 60 * 60)).toFixed(2);

      alert(`Logged ${hours} hours for ${name}. (Connect to Google Sheets next step)`);
      // Reset form
      e.target.reset();
    });
  </script>
</body>
</html>
