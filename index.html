<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airborne Miss WV 2026 • Hours Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/charts/loader.js"></script>
</head>
<body class="bg-gray-50">
  <div class="max-w-4xl mx-auto p-6">
    <h1 class="text-3xl font-bold text-blue-700 mb-2">Airborne Tech Team</h1>
    <h2 class="text-xl text-gray-600 mb-8">Miss West Virginia 2026 Hours Tracker</h2>

    <!-- Embedded Google Form -->
    <div class="bg-white rounded-xl shadow p-6 mb-8">
      <h3 class="text-lg font-semibold mb-4">Log Your Hours</h3>
      <iframe src="https://forms.gle/5Yoj7GxaCCtbLAMW7" width="100%" height="800" frameborder="0" class="rounded-lg"></iframe>
    </div>

    <!-- Live Per-Position Daily Hours -->
    <div class="bg-white rounded-xl shadow p-6">
      <h3 class="text-lg font-semibold mb-4">Live Hours by Day (Per Position)</h3>
      <h4 class="text-lg font-semibold mb-4">Please allow 2-3 minutes to reflect recent changes.</h4>
      
      <div class="mb-4">
        <label class="block text-sm font-medium mb-2">Select Position</label>
        <select id="positionSelect" class="w-full border rounded-lg p-3 text-lg">
          <option value="">— Select Position —</option>
          <option value="Camera 1">Camera 1</option>
          <option value="Camera 2">Camera 2</option>
          <option value="Camera 3">Camera 3</option>
          <option value="Camera 4">Camera 4</option>
          <option value="Gimbal">Gimbal</option>
          <option value="Cells">Cells</option>
          <option value="LED Control">LED Control</option>
          <option value="Lights">Lights</option>
          <option value="Sound">Sound</option>
          <option value="Tracks/Computer">Tracks/Computer</option>
          <option value="Video Switcher">Video Switcher</option>
        </select>
      </div>

      <div id="dailyHours" class="min-h-[200px] text-sm">
        <p class="text-gray-500">Select a position to load live data...</p>
      </div>
    </div>
  </div>

  <script>
    // Replace with your PUBLISHED Sheet URL (CSV format)
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS80oQ2iCkFeFeir44BSdhAjfaKJmXf435BHNUjKOt4gjCtOqr6yyYi670d89-pMvaSGBvovjzHTNTQ/pub?output=csv";

    async function loadPositionData(position) {
      const dailyDiv = document.getElementById('dailyHours');
      dailyDiv.innerHTML = `<p class="text-blue-600">Loading live data for ${position}...</p>`;

      try {
        const response = await fetch(SHEET_CSV_URL);
        const text = await response.text();
        const rows = text.split('\n').map(row => row.split(','));

        // Simple parsing - adjust column indices based on your Sheet
        const data = {};
        for (let i = 1; i < rows.length; i++) {
          const row = rows[i];
          if (row[3] === position) {  // Assuming column B is Position
            const date = row[2];      // Column C = Date
            const hours = parseFloat(row[4]); // Column D = Hours
            if (date && hours) data[date] = (data[date] || 0) + hours;
          }
        }

        let html = `<p class="font-medium mb-3">${position}</p>`;
        if (Object.keys(data).length === 0) {
          html += `<p class="text-gray-500">No hours recorded yet.</p>`;
        } else {
          html += `<table class="w-full border-collapse"><thead><tr class="bg-gray-100"><th class="p-3 text-left">Date</th><th class="p-3 text-right">Hours</th></tr></thead><tbody>`;
          Object.keys(data).sort().forEach(date => {
            html += `<tr><td class="p-3 border-t">${date}</td><td class="p-3 border-t text-right font-medium">${data[date].toFixed(2)}</td></tr>`;
          });
          html += `</tbody></table>`;
        }
        dailyDiv.innerHTML = html;
      } catch (err) {
        dailyDiv.innerHTML = `<p class="text-red-600">Failed to load live data. Check Sheet URL.</p>`;
      }
    }

    document.getElementById('positionSelect').addEventListener('change', (e) => {
      const pos = e.target.value;
      if (pos) loadPositionData(pos);
    });
  </script>
</body>
</html>
