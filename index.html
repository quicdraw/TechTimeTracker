<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airborne Miss WV 2026 • Hours Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50">
  <div class="max-w-4xl mx-auto p-6">
    <h1 class="text-3xl font-bold text-blue-700 mb-2">Airborne Production</h1>
    <h2 class="text-xl text-gray-600 mb-8">Miss West Virginia 2026 Hours Tracker</h2>

    <!-- Log Hours Form -->
    <div class="bg-white rounded-xl shadow p-6 mb-8">
      <h3 class="text-lg font-semibold mb-4">Log Your Hours</h3>
      <form id="hoursForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        
        <div class="md:col-span-2">
          <label class="block text-sm font-medium mb-1">Your Name</label>
          <select id="name" required class="w-full border rounded-lg p-3">
            <option value="">— Select Name —</option>
            <option value="Patty Beall">Patty Beall</option>
            <option value="Jonathan Harbaugh">Jonathan Harbaugh</option>
            <option value="Aiden Ruiz">Aiden Ruiz</option>
            <option value="Andrew Hurley">Andrew Hurley</option>
            <option value="Kailey Ruiz">Kailey Ruiz</option>
            <option value="Isaac Brown">Isaac Brown</option>
            <option value="Devon Ayers">Devon Ayers</option>
            <option value="Jordan Canby">Jordan Canby</option>
            <option value="Allen Hurley">Allen Hurley</option>
            <option value="Josh Jordan">Josh Jordan</option>
            <option value="Evan DeGraw">Evan DeGraw</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Date</label>
          <input type="date" id="date" required class="w-full border rounded-lg p-3">
        </div>

        <div>
          <label class="block text-sm font-medium mb-1" id="hoursLabel">Hours for [Day]</label>
          <input type="number" id="hours" step="0.25" min="0" required class="w-full border rounded-lg p-3" placeholder="e.g. 5.5">
        </div>

        <div class="md:col-span-2">
          <label class="block text-sm font-medium mb-1">Role / Notes (e.g. Camera Blocking, General Rehearsal, Prelim Night 1)</label>
          <input type="text" id="notes" class="w-full border rounded-lg p-3" placeholder="Optional notes">
        </div>

        <button type="submit" class="md:col-span-2 bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700">
          Submit Hours
        </button>
      </form>
    </div>

    <!-- Personal Totals -->
    <div class="bg-white rounded-xl shadow p-6">
      <h3 class="text-lg font-semibold mb-4">Your Running Total</h3>
      <div id="personalTotal" class="text-4xl font-bold text-green-600">0.0</div>
      <p class="text-sm text-gray-500">hours this event</p>
      <div id="history" class="mt-4 text-sm"></div>
    </div>

    <div class="mt-8 text-center text-sm text-gray-500">
      <p>Data is currently saved locally (for demo). We'll connect to Google Sheets next.</p>
    </div>
  </div>

  <script>
    const dateInput = document.getElementById('date');
    const hoursLabel = document.getElementById('hoursLabel');

    // Update label with day of week when date changes
    function updateDayLabel() {
      const dateVal = dateInput.value;
      if (!dateVal) {
        hoursLabel.textContent = "Hours for [Day]";
        return;
      }
      const date = new Date(dateVal);
      const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      hoursLabel.textContent = `Hours for ${days[date.getDay()]}`;
    }

    dateInput.addEventListener('change', updateDayLabel);

    // Form submission (currently localStorage demo)
    document.getElementById('hoursForm').addEventListener('submit', (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value;
      const date = document.getElementById('date').value;
      const hours = parseFloat(document.getElementById('hours').value);
      const notes = document.getElementById('notes').value;

      if (!name || !date || !hours) return;

      // Simple local storage demo (we'll replace with Google Sheets)
      let records = JSON.parse(localStorage.getItem('misswv_hours') || '[]');
      records.push({ name, date, hours, notes });
      localStorage.setItem('misswv_hours', JSON.stringify(records));

      alert(`Logged ${hours} hours for ${name} on ${date}`);
      e.target.reset();
      updateDayLabel(); // reset label
    });
  </script>
</body>
</html>
